[events]

[events.rat_attack]
name = "Rat Attack"
description = "A rat has attacked you!"
image = "rat_attack.png"

# preconditions
required_tech = [ ]
regions = [ "europe", "east_asia", "north_america" ]
city = true

# when it starts end
day_start = 1
day_random = 120
day_end = 10000

# how many times
qty_max = 1

# what it does
give_points = -50
give_funds = 100
give_items = [ 'item_rat' ]
chance = 0.2