#
#   CALENDAR
#
#

[calendar]
start_day = 1997-01-01
end_day = 2004-12-30

#
#   CAMPAIGN
#
#   each month we do create number of random missions of specific arc
#   missions can be blocked by research
#

[campaing]

000 = { weights = { event = 1 }, qty_min = 1, qty_max = 1 }
003 = { weights = { event = 1, exalt = 1, dagon = 1}, qty_min = 1, qty_max = 2 }
006 = { weights = { event = 2, exalt = 1, dagon = }, qty_min = 1, qty_max = 2 }
009 = { weights = { event = 2, exalt = 2, dagon = 1}, qty_min = 1, qty_max = 2 }
012 = { weights = { event = 2, exalt = 3, dagon = 1}, qty_min = 2, qty_max = 3 }
015 = { weights = { event = 2, exalt = 3, aliens = 1}, qty_min = 2, qty_max = 3 }
018 = { weights = { event = 2, exalt = 2, aliens = 2}, qty_min = 2, qty_max = 4 }
021 = { weights = { event = 2, exalt = 2, aliens = 3}, qty_min = 2, qty_max = 4 }
024 = { weights = { event = 2, exalt = 1, aliens = 3}, qty_min = 2, qty_max = 4 }
027 = { weights = { event = 2, exalt = 1, aliens = 3}, qty_min = 3, qty_max = 4 }
030 = { weights = { event = 2, exalt = 1, aliens = 3}, qty_min = 3, qty_max = 4 }
033 = { weights = { event = 2, exalt = 1, aliens = 3}, qty_min = 3, qty_max = 4 }
036 = { weights = { event = 2, exalt = 1, aliens = 3}, qty_min = 3, qty_max = 5 }


#
#   ARCS
#
#   each arc has a specific technology start / end and score modifier
#   from each arc then select random mission that match this arc
#

[arcs]

event = { id = 1, technology_start = [ ], technology_end = [ ] }
zombie = { id = 2, technology_start = [ ],  technology_end = [ 'zombie_solution' ] }
monster = { id = 3,technology_start = [ ],  technology_end = [ ] }

exalt = { id = 4,technology_start = [ ],  technology_end = [ ] }
dagon = { id = 4,technology_start = [ ],  technology_end = [ ] }
red_dawn = { id = 4,technology_start = [ ],  technology_end = [ ] }
lotus = { id = 4, technology_start = [ ],  technology_end = [ ] }

mib = { id = 5,technology_start = [ ],  technology_end = [ ] }
aliens = { id = 6, technology_start = [ ],  technology_end = [ ] }